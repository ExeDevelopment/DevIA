<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>DevAI</title>

<style>
body {
    margin: 0;
    background: #0d0d0d;
    color: #00ffcc;
    font-family: monospace;
}

header {
    background: #111;
    padding: 15px;
    text-align: center;
    font-size: 20px;
}

#chat {
    height: 70vh;
    overflow-y: auto;
    padding: 15px;
}

.msg {
    margin: 10px 0;
}

.user { color: #00aaff; }
.ai { color: #00ffcc; }

#inputArea {
    display: flex;
    padding: 10px;
    background: #111;
}

input {
    flex: 1;
    padding: 10px;
    background: #222;
    border: none;
    color: white;
}

button {
    padding: 10px;
    background: #00ffcc;
    border: none;
    cursor: pointer;
}
</style>
</head>

<body>

<header>🤖 DevAI</header>

<div id="chat"></div>

<div id="inputArea">
    <input id="msg" placeholder="Digite algo..." />
    <button onclick="send()">Enviar</button>
</div>

<script src="app.js"></script>

</body>
</html>
